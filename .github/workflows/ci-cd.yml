name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set deploy environment
        id: env
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if   [ "$BRANCH" = "main" ]; then DEPLOY_ENV="prod"
          elif [ "$BRANCH" = "uat"  ]; then DEPLOY_ENV="uat"
          else                              DEPLOY_ENV="dev"
          fi
          echo "DEPLOY_ENV=$DEPLOY_ENV" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_REPO_NAME=${{ github.event.repository.name }}
            VITE_DEPLOY_ENV=${{ steps.env.outputs.DEPLOY_ENV }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ steps.env.outputs.DEPLOY_ENV }}
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest