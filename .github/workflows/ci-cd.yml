name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Fix bin permissions
        run: chmod +x node_modules/.bin/*

      - name: Set deploy environment
        id: env
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if   [ "$BRANCH" = "main" ]; then DEPLOY_ENV="prod"
          elif [ "$BRANCH" = "uat"  ]; then DEPLOY_ENV="uat"
          else                              DEPLOY_ENV="dev"
          fi
          echo "DEPLOY_ENV=$DEPLOY_ENV" >> $GITHUB_OUTPUT

      - name: Run build
        env:
          VITE_REPO_NAME: ${{ github.event.repository.name }}
          VITE_DEPLOY_ENV: ${{ steps.env.outputs.DEPLOY_ENV }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-${{ steps.env.outputs.DEPLOY_ENV }}
          path: dist
          retention-days: 1

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dev

    steps:
      - name: Download build
        uses: actions/download-artifact@v4.3.0
        with:
          name: build-dev
          path: dist

      - name: Deploy to GitHub Pages (DEV)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}