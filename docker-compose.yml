services:
  ncart-dev:
    profiles: [dev]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

  ncart-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "80:80"
    restart: unless-stopped
